<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

  <div class="header">
    <h1>Mi primer post</h1>
    <p class="meta">Publicado por Litax</p>
  </div>

  <div class="post show">
    <p>Este es mi primer post en GitHub Pages 🚀</p>
  </div>

  <hr style="opacity:0.2; margin:40px 0;">

  <h2>💬 Comentarios</h2>

  <!-- CUSDIS -->
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="f31f1b70-3661-4e30-8006-0596a6906b02"
    data-page-id="post1"
    data-page-url="https://craxkerssj.github.io/litaxblog/posts/post1.html"
    data-page-title="Mi primer post"
  ></div>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

</div>

<script>
// MODO OSCURO
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// CARGAR TEMA
if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}
</script>

</body>
</html>
