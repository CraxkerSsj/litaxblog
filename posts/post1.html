<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi primer post</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

  <div class="header">
    <h1>Mi primer post</h1>
    <p class="meta">Publicado por Litax</p>
  </div>

  <div class="post show">
    <p>Este es mi primer post en GitHub Pages 🚀</p>
  </div>

  <hr style="opacity:0.2; margin:40px 0;">

  <h2>💬 Comentarios</h2>

  <!-- COMENTARIOS -->
  <script src="https://utteranc.es/client.js"
        repo="CraxkerSsj/litaxblog"
        issue-term="pathname"
        theme="github-dark"
        crossorigin="anonymous"
        async>
  </script>

</div>

<script>
// tema
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}
</script>

</body>
</html>
