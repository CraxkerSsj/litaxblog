<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario de Litax</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

  <div class="header">
    <h1>📝 Diario de Litax</h1>
    <p>Mi espacio personal en internet</p>
  </div>

  <div id="posts"></div>

</div>

<script>
fetch("posts.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("posts");

    data.reverse().forEach(post => {
      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <h2><a href="post.html?id=${post.id}">${post.title}</a></h2>
        <p>${post.desc}</p>
`       ;

      container.appendChild(div);
    });

    const posts = document.querySelectorAll(".post");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add("show");
        }
      });
    });

    posts.forEach(p => observer.observe(p));
  });

// TEMA
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}
</script>

</body>
</html>
