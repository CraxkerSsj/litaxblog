<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi primer post</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

  <div class="header">
    <h1>Mi primer post</h1>
    <p class="meta">Publicado por Litax</p>
  </div>

  <div class="post show">
    <p>Este es mi primer post en GitHub Pages 🚀</p>
  </div>

  <hr style="opacity:0.2; margin:40px 0;">

  <h2>💬 Comentarios</h2>

  <!-- CUSDIS -->
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="f31f1b70-3661-4e30-8006-0596a6906b02"
    data-page-id="post1"
    data-page-url="https://craxkerssj.github.io/litaxblog/posts/post1.html"
    data-page-title="Mi primer post"
    data-theme="dark"
  ></div>

</div>

<script>
// CARGAR CUSDIS DINÁMICO
function loadCusdis(theme = "dark") {
  const el = document.getElementById("cusdis_thread");
  el.setAttribute("data-theme", theme);

  // evitar duplicar script
  if (!document.getElementById("cusdis_script")) {
    const script = document.createElement("script");
    script.src = "https://cusdis.com/js/cusdis.es.js";
    script.async = true;
    script.defer = true;
    script.id = "cusdis_script";
    document.body.appendChild(script);
  }
}

// MODO OSCURO / CLARO
function toggleTheme(){
  document.body.classList.toggle("light");

  const isLight = document.body.classList.contains("light");
  const theme = isLight ? "light" : "dark";

  localStorage.setItem("theme", theme);

  // recargar cusdis con nuevo tema
  document.getElementById("cusdis_thread").innerHTML = "";
  loadCusdis(theme);
}

// CARGA INICIAL
const savedTheme = localStorage.getItem("theme") || "dark";

if(savedTheme === "light"){
  document.body.classList.add("light");
}

loadCusdis(savedTheme);
</script>

</body>
</html>
