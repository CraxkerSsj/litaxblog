<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">

  <div class="header">
    <h1 id="post-title"></h1>
    <p class="meta">Publicado por Litax</p>
  </div>

  <div class="post show">
    <p id="post-content"></p>
  </div>

  <hr style="opacity:0.2; margin:40px 0;">

  <h2>💬 Comentarios</h2>

  <!-- DISQUS -->
  <div id="disqus_thread"></div>

</div>

<script>
// obtener ID del post
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

// cargar contenido del post
fetch(`content/${postId}.json`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("post-title").textContent = data.title;
    document.getElementById("post-content").textContent = data.content;

    loadDisqus(postId);
  });

// cargar DISQUS dinámico
function loadDisqus(id) {

  var disqus_config = function () {
    this.page.url = window.location.href;
    this.page.identifier = id;
  };

  (function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://litaxblog.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.body).appendChild(s);
  })();
}

// tema
function toggleTheme(){
  document.body.classList.toggle("light");
  const theme = document.body.classList.contains("light") ? "light" : "dark";
  localStorage.setItem("theme", theme);
}

// cargar tema guardado
if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}
</script>

</body>
</html>
